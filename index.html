<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energia Solar</title>
    <link rel="icon" href="./assets/logorobcodesolutions.ico">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-image: url('roblogo.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
        }

        #turn {
            margin: 0;
            padding: 20px;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #001532;
            background-image: url('roblogo.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #fff;
            z-index: 1000;
            text-align: center;
            box-sizing: border-box;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            outline: 0;
            border: 0;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>

<body>
    <div id="game-container"></div>
    <div id="turn">
        <p>Por favor, gira tu dispositivo a modo horizontal para jugar.</p>
    </div>
    <script type="module" src="scenas/PuzzleSolarScene.js"></script>
    <script type="module" src="scenas/Puzzle2Scene.js"></script>
    <script type="module" src="scenas/Puzzle3Scene.js"></script>
    <script type="module" src="game.js"></script>
    <script>
        function checkOrientation() {
            const isPortrait = window.matchMedia("(orientation: portrait)").matches;
            const isMobile = window.innerWidth < 768;
            document.getElementById("turn").style.display = isPortrait && isMobile ? "flex" : "none";
        }

        window.addEventListener("resize", checkOrientation);
        window.addEventListener("orientationchange", checkOrientation);
        window.addEventListener("DOMContentLoaded", checkOrientation);
    </script>
</body>

</html>
